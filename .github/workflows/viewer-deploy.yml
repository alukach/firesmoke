name: Deploy viewer to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - viewer/**
      - .github/workflows/viewer-deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - run: npm ci

      - name: Build
        env:
          # Project-site path: https://<user>.github.io/firesmoke/
          VITE_BASE: /firesmoke/
          # Default forecast store. Overridable at runtime via ?zarr=… in the URL.
          VITE_ZARR_URL: https://data.source.coop/alukach/firesmoke/forecasts.zarr
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
