<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlueSky smoke forecast viewer</title>
    <!-- Warm the connections we'll hit on first paint: basemap style +
         tiles (CARTO), terrain DEM (AWS), and the hosted forecast store
         (Source Cooperative). Saves ~1 RTT each for DNS+TLS. -->
    <link rel="preconnect" href="https://basemaps.cartocdn.com" crossorigin />
    <link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin />
    <link rel="preconnect" href="https://b.basemaps.cartocdn.com" crossorigin />
    <link rel="preconnect" href="https://c.basemaps.cartocdn.com" crossorigin />
    <link rel="preconnect" href="https://d.basemaps.cartocdn.com" crossorigin />
    <link rel="preconnect" href="https://elevation-tiles-prod.s3.amazonaws.com" crossorigin />
    <link rel="preconnect" href="https://data.source.coop" crossorigin />
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111;
        color: #eee;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
